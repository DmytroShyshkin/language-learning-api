name: CheckBackend

on: push
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'jetbrains'
          java-version: 21
          cache: 'maven'
      - name: Build
        run: mvn clean package -DskipTests